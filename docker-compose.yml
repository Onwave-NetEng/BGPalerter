services:
  bgpalerter:
    image: ntop/bgpalerter:latest
    container_name: bgpalerter
    volumes:
      - ./config/config.yml:/opt/bgpalerter/config.yml
      - ./config/prefixes.yml:/opt/bgpalerter/prefixes.yml
      - ./config/groups.yml:/opt/bgpalerter/groups.yml
      - ./config/rpki.yml:/opt/bgpalerter/rpki.yml
      - ./config/subs.yml:/opt/bgpalerter/subs.yml
      - ./logs:/opt/bgpalerter/logs
    restart: unless-stopped



