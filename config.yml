# BGPalerter 2.0.1 full config.yml

# Global settings
logging:
  level: info
  directory: logs

volume: /opt/bgpalerter

# Monitors section must be an array
monitors: []

# Static prefixes monitoring
statics:
  enabled: true
  monitoredPrefixesFiles:
    - prefixes.yml

# RPKI validation
rpki:
  enabled: true
  files:
    - rpki.yml

# Subscribers / alerts
subs:
  enabled: true
  files:
    - subs.yml

# Optional: add more global settings here


# Optional settings
otherSettings:
  refreshInterval: 300

