# BGPalerter 2.0.1 configuration file
# Generated for clean startup and full feature support

# Main BGPalerter settings
bgpalerter:
  version: 2.0.1
  environment: production
  logging:
    level: info
    directory: /opt/bgpalerter/logs

# Volume mount path (for logs, config, etc.)
volume: /opt/bgpalerter

# Alerts configuration
alerts:
  email:
    enabled: false
    from: "bgpalerter@example.com"
    to:
      - "net-eng@example.com"
    smtp:
      host: "smtp.example.com"
      port: 587
      auth:
        user: "user"
        pass: "password"
  slack:
    enabled: false
    webhook: "https://hooks.slack.com/services/TOKEN"

# Monitored prefixes and groups
statics:
  enabled: true
  monitoredPrefixesFiles:
    - prefixes.yml
  groupsFiles:
    - groups.yml

# RPKI configuration
rpki:
  enabled: true
  rpkiFiles:
    - rpki.yml
  validationFrequency: 3600 # seconds

# Subscription alerts (optional)
subscriptions:
  enabled: true
  files:
    - subs.yml

# Monitors
monitors:
  - type: BGPStream
    enabled: true
    peers:
      - routeviews
      - ris
    collectors:
      - route-views
      - ris

logging:
  directory: logs
  level: info
  console: true
  json: false

# Optional additional features
features:
  as-path-prepend-detection: true
  origin-as-change-detection: true
  large-prefix-detection: true
  withdraw-detection: true

  refreshInterval: 300



