# BGPalerter 2.0.1 full config.yml

environment: production

monitors:
  rpki:
    enabled: true
    file: rpki.yml

  statics:
    enabled: true
    file: prefixes.yml

  groups:
    enabled: true
    file: groups.yml

notifications:
  enabled: false
  file: subs.yml

logging:
  outputLogs: true
  directory: logs       # folder where logs will be written
  level: info          # logging level: debug, info, warn, error
  rotate: true         # enable log rotation
  maxSize: 10M         # max log file size before rotation
  maxFiles: 5          # max number of rotated log files to keep

volume: /opt/bgpalerter  # optional, used internally by env.js

# Optional advanced settings
api:
  enabled: false
  host: 0.0.0.0
  port: 8080

worker:
  concurrency: 4

alerts:
  throttle:
    interval: 300       # seconds to wait before sending the same alert again





