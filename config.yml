# Updated BGPalerter 2.0.1 config.yml

environment: production

volume: /opt/bgpalerter/           # Base path for logs and data

# Monitoring configuration
monitoring:
  rpki:
    enabled: true
    file: rpki.yml

  statics:
    enabled: true
    file: prefixes.yml

  groups:
    enabled: true
    file: groups.yml

# List of monitored prefix files (required in 2.x)
monitoredPrefixesFiles:
  - prefixes.yml

# Notification settings
notifications:
  enabled: false
  file: subs.yml

# Logging settings
logging:
  outputLogs: true
  directory: logs/                  # relative to volume
  level: info
  maxFiles: 10
